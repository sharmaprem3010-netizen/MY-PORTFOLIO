<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
</head>
<body>
    <div id="portfolio">
        <h1>My Projects</h1>
        <button id="addProjectBtn">Add Project</button>
        <div id="projectList" class="project-list"></div>
    </div>

    <div id="addProjectModal" style="display: none;">
        <h2>Add Project</h2>
        <input type="text" id="projectName" placeholder="Project Name">
        <input type="text" id="projectDescription" placeholder="Project Description">
        <input type="url" id="projectLink" placeholder="Project Link">
        <button id="saveProjectBtn">Save Project</button>
        <button id="closeModalBtn">Close</button>
    </div>

    <script>
        const projectList = document.getElementById('projectList');
        const addProjectModal = document.getElementById('addProjectModal');
        const projectNameInput = document.getElementById('projectName');
        const projectDescriptionInput = document.getElementById('projectDescription');
        const projectLinkInput = document.getElementById('projectLink');

        document.getElementById('addProjectBtn').onclick = function() {
            addProjectModal.style.display = 'block';
        };

        document.getElementById('closeModalBtn').onclick = function() {
            addProjectModal.style.display = 'none';
        };

        document.getElementById('saveProjectBtn').onclick = function() {
            const projectName = projectNameInput.value;
            const projectDescription = projectDescriptionInput.value;
            const projectLink = projectLinkInput.value;
            const projectData = {name: projectName, description: projectDescription, link: projectLink};
            renderProjectCard(projectData);
            addProjectModal.style.display = 'none';
        };

        function renderProjectCard(project) {
            const card = document.createElement('div');
            card.className = 'project-card';
            if (project.link) {
                card.innerHTML = `<a href='${project.link}' target='_blank'>\n                    <h3>${project.name}</h3>\n                    <p>${project.description}</p>\n                </a>`;
            } else {
                card.innerHTML = `<h3>${project.name}</h3><p>${project.description}</p>`;
            }
            projectList.appendChild(card);
        }
    </script>
</body>
</html>
