<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portfolio">
        <h1>My Projects</h1>
        <button id="addProjectBtn">Add Project</button>
        <div id="projectsContainer"></div>
    </div>
    <div class="modal" id="addProjectModal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Add a New Project</h2>
            <form id="addProjectForm">
                <label for="projectTitle">Project Title:</label>
                <input type="text" id="projectTitle" required>
                <label for="projectDescription">Project Description:</label>
                <textarea id="projectDescription" required></textarea>
                <label for="projectLink">Project Link:</label>
                <input type="url" id="projectLink" placeholder="Enter project URL">
                <button type="submit">Add Project</button>
            </form>
        </div>
    </div>
    <script>
    const projects = [];

    document.getElementById('addProjectBtn').onclick = function() {
        document.getElementById('addProjectModal').style.display = 'block';
    };

    document.querySelector('.close-btn').onclick = function() {
        document.getElementById('addProjectModal').style.display = 'none';
    };

    document.getElementById('addProjectForm').onsubmit = function(event) {
        event.preventDefault();
        const title = document.getElementById('projectTitle').value;
        const description = document.getElementById('projectDescription').value;
        const link = document.getElementById('projectLink').value;
        projects.push({title, description, link});
        renderProjects();
        document.getElementById('addProjectModal').style.display = 'none';
    };

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        container.innerHTML = '';
        projects.forEach(project => {
            const projectCard = document.createElement('div');
            projectCard.className = 'project-card';
            projectCard.innerHTML = `<h3>${project.title}</h3><p>${project.description}</p>`;
            if (project.link) {
                const linkElement = document.createElement('a');
                linkElement.href = project.link;
                linkElement.target = '_blank';
                linkElement.innerText = 'View Project';
                projectCard.appendChild(linkElement);
                projectCard.style.cursor = 'pointer';
            }
            container.appendChild(projectCard);
        });
    }
    </script>
</body>
</html>
